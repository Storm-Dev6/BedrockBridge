name: BedrockBridge CI

on:
  push:
    branches:
      - main
      - development
      - "codex/**"
      - "feature/**"

  pull_request:
    branches:
      - main
      - development

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Java 21 build and tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify wrapper files
        shell: bash
        run: |
          test -f gradlew
          test -f gradlew.bat
          test -f gradle/wrapper/gradle-wrapper.properties
          test -f gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Show Java version
        run: java -version

      - name: Show Gradle version
        run: ./gradlew --no-daemon --version

      - name: Run checks
        run: ./gradlew --no-daemon clean check --stacktrace

      - name: Build artifacts
        run: ./gradlew --no-daemon clean build --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: warn

      - name: Upload JAR artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: bedrockbridge-jars
          path: "**/build/libs/*.jar"
          if-no-files-found: warn
